<body>

            alt="BookSmart Digital Company Logo" title="To home page">

    <form method="post" action="https://mercury.swin.edu.au/it000000/formtest.php">
        <fieldset>
            <legend>Reference number</legend>
            <p>
                <label for="job_reference_number">Job reference number</label>
                <input type="text" name="Job reference number" id="job_reference_number" required="required"
                    pattern="[a-zA-Z0-9]{5}" />
            </p>

        </fieldset>
        <fieldset>
            <legend>Your details</legend>
            <p>
                <label for="given_name">Given Name</label>
                <input type="text" name="Given Name" id="given_name" required="required" pattern="[a-zA-Z]{1-20}" />
            </p>
            <p>
                <label for="family_name">Family Name</label>
                <input type="text" name="Family Name" id="family_name" required="required" pattern="[a-zA-Z]{1-20}" />
            </p>
            <p>
                <label for="dob">Date of birth</label>
                <input type="date" name="DOB" id="dob" required="required" />
            </p>
            <p>
                <input type="radio" name="Gender" id="M_radio" value="M" required="required">
                <label for="M_radio">Male</label>
                <input type="radio" name="Gender" id="F_radio" value="F" required="required">
                <label for="F_radio">Female</label>
                <input type="radio" name="Gender" id="X_radio" value="X" required="required">
                <label for="X_radio">Other</label>
            </p>
            <p>
                <label for="street_address">Street Address</label>
                <input type="text" name="Street Address" id="street_address" required="required"
                    pattern="[a-zA-Z]{1-40}">
            </p>
            <p>
                <label for="suburb">Suburb/Town</label>
                <input type="text" name="Suburb/Town" id="suburb" required="required" pattern="[a-zA-Z]{1-40}">
            </p>
            <p>
                <label for="state">State</label>
                <select name="State" id="state">
                    <option value="">Please Select</option>
                    <option value="VIC">VIC</option>
                    <option value="NSW">NSW</option>
                    <option value="WA">WA</option>
                    <option value="QLD">QLD</option>
                    <option value="NA">NA</option>
                    <option value="TAS">TAS</option>
                    <option value="ACT">ACT</option>
                </select>
            </p>
            <p>
                <!-- TODO: finish this -->
            </p>
        </fieldset>
        <fieldset>
            <legend>Skills</legend>
            <p>
                <!-- TODO: finish this -->
            </p>
        </fieldset>
        <input type="submit" value="Register" />
        <input type="reset" value="Reset Form" />
    </form>
</body>

</html>
